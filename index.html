<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ec4899">
    <title>Telugu Connect</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('tc_theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        body { font-family: sans-serif; -webkit-tap-highlight-color: transparent; height: 100dvh; }
        .screen { transition: opacity 0.3s ease; height: 100dvh; }
        .chat-bg { background-color: #efeae2; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
        .toast-animate { animation: slideDown 0.4s ease forwards; }
        .interest-cb:checked + label { background-color: #ec4899; color: white; border-color: #ec4899; }
        #profile-card { touch-action: none; will-change: transform, opacity; transition: transform 0.3s ease, opacity 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 w-screen overflow-hidden transition-colors duration-300 relative">

    <div id="toast-msg" class="hidden fixed left-1/2 transform -translate-x-1/2 z-[999] px-6 py-3 rounded-full text-white font-bold shadow-2xl text-center min-w-[250px] transition-all"></div>

    <div id="loading-screen" class="screen flex flex-col justify-center items-center w-full bg-gradient-to-r from-pink-500 to-orange-400 p-6 absolute inset-0 z-50">
        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-2 animate-bounce drop-shadow-lg text-center tracking-tight">Telugu Connect</h1>
        <p class="text-white text-sm font-medium tracking-widest mt-2">CONNECTING...</p>
    </div>

    <div id="login-screen" class="screen hidden flex-col justify-center items-center w-full bg-gradient-to-r from-pink-500 to-orange-400 p-6 absolute inset-0 z-40">
        <h1 class="text-5xl font-extrabold text-white mb-2 drop-shadow-md">Telugu Connect</h1>
        <p class="text-white mb-10 text-center font-medium">Meet Telugu youths around you!</p>
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-xl font-bold mb-4 text-gray-800">18+ Only</h2>
            <button onclick="handleGoogleLogin()" class="w-full bg-black text-white font-bold py-4 px-4 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-800 transition active:scale-95 shadow-lg">
                <span>Continue with Google</span>
            </button>
        </div>
    </div>

    <div id="profile-setup-screen" class="screen hidden flex-col justify-center items-center w-full bg-gradient-to-r from-pink-500 to-orange-400 p-6 overflow-y-auto absolute inset-0 z-40">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-2xl w-full max-w-sm my-auto mt-10">
            <h2 class="text-2xl font-bold mb-4 text-gray-800 dark:text-white text-center">Your Profile</h2>
            
            <div class="flex flex-col items-center mb-6">
                <div id="setup-pic-preview" class="w-28 h-28 rounded-full bg-gray-200 border-4 border-pink-500 bg-cover bg-center flex items-center justify-center overflow-hidden relative shadow-md">
                    <span class="text-xs text-gray-800 font-bold bg-white/80 px-2 py-1 rounded-md z-0 pointer-events-none">Choose Photo</span>
                    <input type="file" accept="image/*" onchange="handleInstantPhotoPreview(event, 'setup')" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                </div>
            </div>

            <div class="space-y-4">
                <input type="text" id="setup-name" class="w-full border-2 border-gray-100 dark:border-gray-700 dark:bg-gray-700 dark:text-white rounded-xl p-3 outline-none focus:border-pink-500" placeholder="Display Name">
                <input type="text" id="setup-username" class="w-full border-2 border-gray-100 dark:border-gray-700 dark:bg-gray-700 dark:text-white rounded-xl p-3 outline-none focus:border-pink-500" placeholder="Username (no spaces)">
                <div class="flex gap-2">
                    <input type="number" id="setup-age" min="18" max="99" class="w-1/2 border-2 border-gray-100 dark:border-gray-700 dark:bg-gray-700 dark:text-white rounded-xl p-3 outline-none focus:border-pink-500" placeholder="Age">
                    <select id="setup-gender" class="w-1/2 border-2 border-gray-100 dark:border-gray-700 dark:bg-gray-700 dark:text-white rounded-xl p-3 outline-none focus:border-pink-500">
                        <option value="">Gender</option>
                        <option value="Boy">Boy</option>
                        <option value="Girl">Girl</option>
                    </select>
                </div>
                <input type="text" id="setup-city" class="w-full border-2 border-gray-100 dark:border-gray-700 dark:bg-gray-700 dark:text-white rounded-xl p-3 outline-none focus:border-pink-500" placeholder="City (e.g., Hyderabad)">
            </div>
            <button onclick="saveProfileSetup()" class="w-full bg-pink-500 text-white font-bold py-4 mt-6 rounded-xl hover:bg-pink-600 shadow-lg active:scale-95">Save & Enter</button>
        </div>
    </div>

    <div id="settings-screen" class="screen hidden flex-col w-full bg-gray-50 dark:bg-gray-900 overflow-y-auto absolute inset-0 z-40">
        <div class="bg-white dark:bg-gray-800 p-4 shadow-sm flex items-center gap-4 z-10 sticky top-0">
            <button onclick="switchScreen('home-screen')" class="text-pink-600 font-bold text-xl">&larr;</button>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">Settings</h1>
        </div>
        <div class="p-6 flex flex-col items-center pb-20">
            <div id="edit-pic-preview" class="w-32 h-32 rounded-full bg-gray-200 border-4 border-pink-500 bg-cover bg-center mb-6 flex items-center justify-center overflow-hidden relative shadow-lg">
                <span class="text-xs text-gray-800 font-bold bg-white/80 px-2 py-1 rounded-md z-0 pointer-events-none">Change Photo</span>
                <input type="file" accept="image/*" onchange="handleInstantPhotoPreview(event, 'edit')" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
            </div>
            
            <div class="w-full max-w-sm space-y-4">
                <input type="text" id="edit-name" class="w-full border-2 border-gray-100 dark:border-gray-700 dark:bg-gray-800 dark:text-white rounded-xl p-3 outline-none focus:border-pink-500" placeholder="Name">
                <input type="text" id="edit-city" class="w-full border-2 border-gray-100 dark:border-gray-700 dark:bg-gray-800 dark:text-white rounded-xl p-3 outline-none focus:border-pink-500" placeholder="City">
                <textarea id="edit-bio" rows="3" class="w-full border-2 border-gray-100 dark:border-gray-700 dark:bg-gray-800 dark:text-white rounded-xl p-3 outline-none focus:border-pink-500" placeholder="Bio"></textarea>
                <button onclick="saveEditedProfile()" class="w-full bg-pink-500 text-white font-bold py-4 mt-4 rounded-xl hover:bg-pink-600 shadow-lg active:scale-95">Update Profile</button>
            </div>
            
            <div class="w-full max-w-sm mt-10 border-t border-gray-200 dark:border-gray-700 pt-6">
                <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-4">Blocked Users 🚫</h3>
                <div id="blocked-users-list" class="space-y-3"><p class="text-sm text-gray-500">Loading...</p></div>
            </div>
            
            <button onclick="logoutApp()" class="w-full max-w-sm border-2 border-gray-300 text-gray-700 dark:text-gray-300 font-bold py-3 mt-10 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-800 active:scale-95 transition">Logout</button>
            <button onclick="deleteAccount()" class="w-full max-w-sm bg-red-50 border-2 border-red-500 text-red-500 font-bold py-3 mt-4 rounded-xl hover:bg-red-500 hover:text-white dark:bg-transparent dark:hover:bg-red-600 transition active:scale-95">Delete Account 🗑️</button>
        </div>
    </div>

<div id="home-screen" class="screen hidden flex-col w-full bg-gray-50 dark:bg-gray-900 relative transition-colors absolute inset-0 z-30">
        <div id="match-overlay" class="absolute inset-0 bg-black/95 z-50 hidden flex-col justify-center items-center p-6 text-center backdrop-blur-sm">
            <h1 class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 mb-2 animate-pulse">Match! 💖</h1>
            <p class="text-white text-lg mb-8">You both liked each other.</p>
            <div class="flex gap-4 mb-10">
                <div id="match-my-pic" class="w-28 h-28 rounded-full border-4 border-white bg-cover bg-center shadow-2xl"></div>
                <div id="match-their-pic" class="w-28 h-28 rounded-full border-4 border-white bg-cover bg-center shadow-2xl"></div>
            </div>
            <button onclick="goToChatFromMatch()" class="bg-gradient-to-r from-pink-500 to-orange-400 text-white font-bold py-4 px-10 rounded-full w-full max-w-xs mb-4 shadow-xl active:scale-95 transition transform">Chat Now 💬</button>
            <button onclick="closeMatchOverlay()" class="text-gray-300 font-medium">Keep Swiping</button>
        </div>

        <div class="bg-white dark:bg-gray-800 p-4 shadow-sm flex justify-between items-center z-10">
            <h1 class="text-2xl font-black text-pink-500 tracking-tighter">Telugu Connect</h1>
            <div class="flex gap-4 items-center">
                <button onclick="toggleDarkMode()" class="text-2xl active:scale-75 transition">🌙</button>
                <button onclick="openSettings()" class="text-2xl active:scale-75 transition">⚙️</button>
                <button onclick="openChatList()" class="bg-pink-100 dark:bg-gray-700 text-pink-600 dark:text-white px-3 py-1.5 rounded-full font-bold active:scale-95 transition shadow-sm">Chats</button>
            </div>
        </div>

        <div class="flex-1 p-4 flex justify-center items-center relative overflow-hidden" id="feed-container">
            <div id="profile-card" class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden relative">
            </div>
        </div>

        <div class="p-6 flex justify-center gap-8 mb-4 z-10" id="action-buttons-layer">
            <button onclick="handleAction('pass')" class="bg-white dark:bg-gray-800 text-red-500 shadow-xl rounded-full h-16 w-16 text-3xl font-bold active:scale-75 transition border border-gray-100 dark:border-gray-700 flex items-center justify-center">✕</button>
            <button onclick="handleAction('like')" class="bg-gradient-to-r from-pink-500 to-orange-400 text-white shadow-xl rounded-full h-16 w-16 text-3xl font-bold active:scale-75 transition flex items-center justify-center">♥</button>
        </div>
    </div>

    <div id="chat-list-screen" class="screen hidden flex-col w-full bg-white dark:bg-gray-900 overflow-y-auto absolute inset-0 z-40">
        <div class="bg-[#075e54] text-white p-4 shadow-md flex items-center gap-4 z-10 sticky top-0">
            <button onclick="switchScreen('home-screen')" class="font-bold text-2xl active:scale-90 transition">&larr;</button>
            <h1 class="text-xl font-bold">Your Matches</h1>
        </div>
        <div id="chat-list-container" class="flex-1 divide-y divide-gray-100 dark:divide-gray-800"></div>
    </div>

    <div id="chat-screen" class="screen hidden flex-col w-full bg-white relative absolute inset-0 z-50">
        <div class="bg-[#075e54] text-white p-4 shadow-md flex items-center gap-3 z-10">
            <button onclick="exitChat()" class="font-bold text-2xl active:scale-90 transition">&larr;</button>
            <div id="chat-header-pic" class="w-10 h-10 rounded-full bg-gray-300 bg-cover bg-center shadow-sm"></div>
            <div class="flex-1">
                <h1 id="chat-header-name" class="font-bold leading-tight">Chat</h1>
                <p id="chat-header-status" class="text-xs text-gray-200 font-medium h-4">Connecting...</p>
            </div>
            <button onclick="blockUser()" class="text-red-400 hover:text-red-300 font-bold text-xl" title="Block User">🚫</button>
        </div>

        <div class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col gap-2" id="chat-messages-container"></div>

        <div class="p-3 bg-[#f0f0f0] flex gap-2 items-center border-t border-gray-300 w-full z-50 shrink-0 pb-6">
            <input type="text" id="msg-input" oninput="handleTyping()" placeholder="Type a message..." class="flex-1 bg-white rounded-full px-5 py-3.5 outline-none shadow-sm text-gray-800 focus:ring-2 focus:ring-[#128C7E]">
            <button onclick="sendLiveMessage()" class="bg-[#128C7E] text-white rounded-full w-12 h-12 flex items-center justify-center font-bold shadow-md hover:bg-[#075e54] active:scale-90 shrink-0">➤</button>
        </div>
    </div>
<script>
        function switchScreen(targetScreenId) {
            document.querySelectorAll('.screen').forEach(s => { s.classList.add('hidden'); s.classList.remove('flex'); });
            document.getElementById(targetScreenId).classList.remove('hidden');
            document.getElementById(targetScreenId).classList.add('flex');
        }

        window.showToast = (msg, type = 'success') => {
            const toast = document.getElementById('toast-msg');
            toast.innerText = msg;
            toast.className = `toast-animate fixed top-[40px] left-1/2 transform -translate-x-1/2 z-[999] px-6 py-3 rounded-full text-white font-bold shadow-2xl text-center min-w-[250px] ${type === 'error' ? 'bg-red-500' : 'bg-gray-900'}`;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }

        window.toggleDarkMode = () => { 
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('tc_theme', isDark ? 'dark' : 'light'); 
        }
        
        window.onload = () => { switchScreen('loading-screen'); };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2vOFa2aMwQFa2KEej0ZuXVFQUHUQTZEc",
            authDomain: "telugu-connect-64786.firebaseapp.com",
            projectId: "telugu-connect-64786",
            storageBucket: "telugu-connect-64786.firebasestorage.app",
            messagingSenderId: "341601787937",
            appId: "1:341601787937:web:0d629d09af84817864c360"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); window.db = getFirestore(app); window.storage = getStorage(app); window.provider = new GoogleAuthProvider();

        window.currentUserData = null; window.feedProfiles = []; window.currentFeedIndex = 0;   
        window.matchedProfileData = null; window.activeChatId = null; 
        window.unsubscribeChatListener = null; window.unsubscribeStatusListener = null; window.unsubscribeTypingListener = null;
        window.pendingPhotoFile = null; window.blockedUidList = []; window.swipedUidList = [];
        let typingTimeout = null;

         // FIX: Asalu error ento screen meeda Popup avvadaniki Alert add chesanu
        onAuthStateChanged(window.auth, async (user) => {
            try {
                if (user) {
                    const userSnap = await getDoc(doc(window.db, "Users", user.uid));
                    if(!userSnap.exists()) {
                        window.currentUserData = { uid: user.uid, name: user.displayName, email: user.email, photoURL: user.photoURL };
                        switchScreen('profile-setup-screen');
                        document.getElementById('setup-name').value = user.displayName || "";
                        if(user.photoURL) document.getElementById('setup-pic-preview').style.backgroundImage = `url('${user.photoURL}')`;
                        return;
                    }
                    await setDoc(doc(window.db, "Users", user.uid), { online: true, lastActive: serverTimestamp() }, { merge: true });
                    const blockSnap = await getDocs(query(collection(window.db, "Blocks"), where("blocker", "==", user.uid)));
                    window.blockedUidList = []; blockSnap.forEach(d => window.blockedUidList.push(d.data().blocked));
                    const swipeSnap = await getDocs(query(collection(window.db, "Likes"), where("from", "==", user.uid)));
                    window.swipedUidList = []; swipeSnap.forEach(d => window.swipedUidList.push(d.data().to));

                    if (userSnap.exists() && userSnap.data().age) {
                        window.currentUserData = { ...userSnap.data(), uid: user.uid };
                        window.showToast("Welcome back, " + window.currentUserData.name + "!");
                        switchScreen('home-screen'); window.fetchDiscoverFeed(); setupSwipeListeners();
                    }
                } else { switchScreen('login-screen'); }
            } catch (error) {
                // EKKADA ERROR VASTHUNDO SCREEN MEEDA CHUPISTHUNDI
                alert("🔥 FIREBASE ERROR: " + error.message);
                window.showToast("Error: " + error.message, "error");
                switchScreen('login-screen');
            }
        });

        window.handleGoogleLogin = async () => { 
            try { 
                await signInWithPopup(window.auth, window.provider); 
            } catch (error) { 
                // LOGIN FAILED AITHE REASON ENTO CHUPISTHUNDI
                alert("🔑 LOGIN ERROR: " + error.message);
                window.showToast("Login Failed", "error"); 
            } 
        };

                    
                    const blockSnap = await getDocs(query(collection(window.db, "Blocks"), where("blocker", "==", user.uid)));
                    window.blockedUidList = []; blockSnap.forEach(d => window.blockedUidList.push(d.data().blocked));

                    const swipeSnap = await getDocs(query(collection(window.db, "Likes"), where("from", "==", user.uid)));
                    window.swipedUidList = []; swipeSnap.forEach(d => window.swipedUidList.push(d.data().to));

                    // Check Profile Completion
                    const userSnap = await getDoc(doc(window.db, "Users", user.uid));
                    if (userSnap.exists() && userSnap.data().age) {
                        window.currentUserData = { ...userSnap.data(), uid: user.uid };
                        window.showToast("Welcome back, " + window.currentUserData.name + "!");
                        switchScreen('home-screen'); window.fetchDiscoverFeed(); setupSwipeListeners();
                    } else {
                        // FIX: Added robust else fallback to stop infinite loop
                        window.currentUserData = { uid: user.uid, name: user.displayName, email: user.email, photoURL: user.photoURL };
                        switchScreen('profile-setup-screen');
                        document.getElementById('setup-name').value = user.displayName || "";
                        if(user.photoURL) document.getElementById('setup-pic-preview').style.backgroundImage = `url('${user.photoURL}')`;
                    }
                } else { switchScreen('login-screen'); }
            } catch (error) {
                console.error("Auth Load Error: ", error);
                window.showToast("Network Error. Please reload.", "error");
                switchScreen('login-screen');
            }
        });

        window.handleGoogleLogin = async () => { try { await signInWithPopup(window.auth, window.provider); } catch (e) { window.showToast("Login Failed", "error"); } };
        window.logoutApp = async () => { await signOut(window.auth); window.showToast("Logged out!"); switchScreen('login-screen'); };

// OTP DELETE ACCOUNT
        window.deleteAccount = async () => {
            const otp = Math.floor(1000 + Math.random() * 9000); 
            const confirmCode = prompt(`⚠️ WARNING: Deleting your account is permanent!\nTo confirm, type this OTP exactly: ${otp}`);
            
            if (confirmCode === String(otp)) {
                try {
                    window.showToast("Deleting your data...", "success");
                    await deleteDoc(doc(window.db, "Users", window.currentUserData.uid));
                    const user = window.auth.currentUser;
                    if (user) {
                        await deleteUser(user).catch(err => {
                            console.log("Requires recent login to delete Auth, signing out instead.");
                            return signOut(window.auth);
                        });
                    }
                    window.showToast("Account deleted.", "success");
                } catch (e) {
                    window.showToast("Failed to delete.", "error");
                }
            } else if (confirmCode !== null && confirmCode !== "") {
                window.showToast("Incorrect OTP.", "error");
            }
        };

        window.handleInstantPhotoPreview = (event, source) => {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const id = source === 'edit' ? 'edit-pic-preview' : 'setup-pic-preview';
                document.getElementById(id).style.backgroundImage = `url('${e.target.result}')`;
                window.pendingPhotoFile = file; 
                window.showToast("Photo selected! Click save below.", "success");
            };
            reader.readAsDataURL(file);
        };

        const uploadPendingPhoto = async () => {
            if(!window.pendingPhotoFile) return window.currentUserData?.profilePicUrl || 'https://via.placeholder.com/150';
            window.showToast("Saving photo...", "success");
            const storageRef = ref(window.storage, 'profilePics/' + window.currentUserData.uid + '_' + Date.now());
            await uploadBytes(storageRef, window.pendingPhotoFile);
            const url = await getDownloadURL(storageRef);
            window.pendingPhotoFile = null;
            return url;
        };

        window.saveProfileSetup = async () => {
            const name = document.getElementById('setup-name').value.trim();
            const username = document.getElementById('setup-username').value.trim().toLowerCase();
            const age = parseInt(document.getElementById('setup-age').value);
            const gender = document.getElementById('setup-gender').value;
            const city = document.getElementById('setup-city').value.trim();

            if (!name || !username || !age || !gender || !city) { window.showToast("All fields required!", "error"); return; }
            if (age < 18) { window.showToast("Strictly 18+!", "error"); return; }
            
            try {
                const finalPicUrl = await uploadPendingPhoto();
                const payload = { uid: window.currentUserData.uid, name, username, age, gender, city, email: window.currentUserData.email||"", profilePicUrl: finalPicUrl, bio: "Hey there!", online: true };
                await setDoc(doc(window.db, "Users", window.currentUserData.uid), payload, { merge: true });
                window.currentUserData = payload;
                switchScreen('home-screen'); window.fetchDiscoverFeed(); setupSwipeListeners();
            } catch (e) { window.showToast("Error saving profile", "error"); console.log(e); }
        };

        window.openSettings = () => {
            document.getElementById('edit-name').value = window.currentUserData.name || '';
            document.getElementById('edit-city').value = window.currentUserData.city || '';
            document.getElementById('edit-bio').value = window.currentUserData.bio || '';
            document.getElementById('edit-pic-preview').style.backgroundImage = `url('${window.currentUserData.profilePicUrl}')`;
            window.pendingPhotoFile = null;
            window.loadBlockedUsers(); switchScreen('settings-screen');
        };

        window.saveEditedProfile = async () => {
            const name = document.getElementById('edit-name').value.trim();
            const city = document.getElementById('edit-city').value.trim();
            const bio = document.getElementById('edit-bio').value.trim();
            if(!name || !city) { window.showToast("Name and City required!", "error"); return; }
            
            try {
                const finalPicUrl = await uploadPendingPhoto();
                const updates = { name, city, bio, profilePicUrl: finalPicUrl };
                await setDoc(doc(window.db, "Users", window.currentUserData.uid), updates, { merge: true });
                window.currentUserData = { ...window.currentUserData, ...updates };
                window.showToast("Profile Updated!"); switchScreen('home-screen');
            } catch (e) { window.showToast("Update failed", "error"); }
        };

        window.loadBlockedUsers = async () => {
            const container = document.getElementById('blocked-users-list');
            if (window.blockedUidList.length === 0) { container.innerHTML = `<p class="text-sm text-gray-400">No blocks.</p>`; return; }
            container.innerHTML = "";
            for (let targetUid of window.blockedUidList) {
                const targetSnap = await getDoc(doc(window.db, "Users", targetUid));
                if (targetSnap.exists()) {
                    const data = targetSnap.data();
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center bg-gray-100 dark:bg-gray-800 p-3 rounded-xl";
                    item.innerHTML = `<div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-cover bg-center shadow" style="background-image: url('${data.profilePicUrl}')"></div><span class="font-bold text-gray-800 dark:text-white">${data.name}</span></div><button onclick="unblockUser('${targetUid}')" class="text-xs bg-red-100 text-red-600 px-3 py-2 rounded-lg font-bold">Unblock</button>`;
                    container.appendChild(item);
                }
            }
        };

window.unblockUser = async (targetUid) => {
            try {
                await deleteDoc(doc(window.db, "Blocks", `${window.currentUserData.uid}_${targetUid}`));
                window.blockedUidList = window.blockedUidList.filter(id => id !== targetUid);
                window.showToast("User unblocked!", "success"); window.loadBlockedUsers(); window.fetchDiscoverFeed();
            } catch (e) { window.showToast("Failed to unblock", "error"); }
        };

        window.fetchDiscoverFeed = async () => {
            const targetGender = window.currentUserData.gender === "Boy" ? "Girl" : "Boy";
            const q = query(collection(window.db, "Users"), where("gender", "==", targetGender));
            const snap = await getDocs(q);
            window.feedProfiles = [];
            snap.forEach(doc => { 
                if (doc.id !== window.currentUserData.uid && !window.blockedUidList.includes(doc.id) && !window.swipedUidList.includes(doc.id)) { 
                    window.feedProfiles.push(doc.data()); 
                }
            });
            window.currentFeedIndex = 0; window.renderCurrentProfile();
        };

        window.renderCurrentProfile = () => {
            const card = document.getElementById('profile-card');
            card.style.transition = 'none'; card.style.transform = `translateX(0px) rotate(0deg)`; card.style.opacity = 1;

            if (window.feedProfiles.length === 0 || window.currentFeedIndex >= window.feedProfiles.length) {
                card.innerHTML = `<div class="p-10 text-center flex flex-col justify-center items-center h-[450px]"><h3 class="text-xl font-bold dark:text-white">No Profiles Left! 🌍</h3></div>`;
                document.getElementById('action-buttons-layer').classList.add('hidden'); return;
            }
            const p = window.feedProfiles[window.currentFeedIndex];
            
            card.innerHTML = `
                <div id="card-image-bg" class="h-[450px] bg-cover bg-center flex items-center justify-center text-gray-500 bg-gray-200 select-none relative" style="background-image: url('${p.profilePicUrl}')">
                    <div id="stamp-like" class="absolute top-12 left-6 border-4 border-green-500 text-green-500 font-extrabold text-4xl px-3 py-1 rounded-xl transform -rotate-12 opacity-0 z-50 pointer-events-none tracking-widest bg-white/20">LIKE</div>
                    <div id="stamp-nope" class="absolute top-12 right-6 border-4 border-red-500 text-red-500 font-extrabold text-4xl px-3 py-1 rounded-xl transform rotate-12 opacity-0 z-50 pointer-events-none tracking-widest bg-white/20">NOPE</div>
                </div>
                <div class="p-6 absolute bottom-0 w-full bg-gradient-to-t from-black via-black/80 to-transparent pt-20 pointer-events-none">
                    <h2 id="card-name-age" class="text-3xl font-black text-white drop-shadow-md">${p.name}, ${p.age}</h2>
                    <p id="card-city" class="text-gray-200 font-medium drop-shadow-md">${p.city}</p>
                </div>`;
            document.getElementById('action-buttons-layer').classList.remove('hidden');
        };

        function setupSwipeListeners() {
            const card = document.getElementById('profile-card');
            let startX = 0, currentX = 0, isDragging = false;
            
            card.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX; isDragging = true; card.style.transition = 'none';
            });
            card.addEventListener('touchmove', (e) => {
                if(!isDragging) return;
                currentX = e.touches[0].clientX;
                const deltaX = currentX - startX;
                card.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.03}deg)`; 
                card.style.opacity = Math.max(1 - Math.abs(deltaX)/500, 0.5); 
                
                let stampLike = document.getElementById('stamp-like'); let stampNope = document.getElementById('stamp-nope');
                if(stampLike && stampNope) {
                    if(deltaX > 0) { stampLike.style.opacity = Math.min(deltaX / 100, 1); stampNope.style.opacity = 0; } 
                    else { stampNope.style.opacity = Math.min(Math.abs(deltaX) / 100, 1); stampLike.style.opacity = 0; }
                }
            });
            card.addEventListener('touchend', (e) => {
                if(!isDragging) return; isDragging = false;
                const deltaX = currentX - startX; card.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                
                if(deltaX > 100) {
                    card.style.transform = `translateX(1000px) rotate(30deg)`; card.style.opacity = 0;
                    setTimeout(() => window.handleAction('like'), 300);
                } else if (deltaX < -100) {
                    card.style.transform = `translateX(-1000px) rotate(-30deg)`; card.style.opacity = 0;
                    setTimeout(() => window.handleAction('pass'), 300);
                } else {
                    card.style.transform = `translateX(0px) rotate(0deg)`; card.style.opacity = 1;
                    if(document.getElementById('stamp-like')) document.getElementById('stamp-like').style.opacity = 0;
                    if(document.getElementById('stamp-nope')) document.getElementById('stamp-nope').style.opacity = 0;
                }
            });
        }

window.handleAction = async (actionType) => {
            const target = window.feedProfiles[window.currentFeedIndex];
            const card = document.getElementById('profile-card');

            if (card.style.transform === 'translateX(0px) rotate(0deg)' || card.style.transform === '') {
                card.style.transition = 'transform 0.3s ease, opacity 0.3s ease'; card.style.opacity = 0;
                if(actionType === 'like') { card.style.transform = `translateX(1000px) rotate(30deg)`; } 
                else { card.style.transform = `translateX(-1000px) rotate(-30deg)`; }
            }

            const myUid = window.currentUserData.uid; const targetUid = target.uid;
            window.swipedUidList.push(targetUid); 

            await setDoc(doc(window.db, "Likes", `${myUid}_${targetUid}`), { from: myUid, to: targetUid, type: actionType });

            if (actionType === 'like') {
                const revSnap = await getDoc(doc(window.db, "Likes", `${targetUid}_${myUid}`));
                if (revSnap.exists() && revSnap.data().type === 'like') {
                    const matchId = myUid < targetUid ? `${myUid}_${targetUid}` : `${targetUid}_${myUid}`;
                    await setDoc(doc(window.db, "Matches", matchId), { users: [myUid, targetUid], timestamp: Date.now() });
                    window.matchedProfileData = target;
                    document.getElementById('match-my-pic').style.backgroundImage = `url('${window.currentUserData.profilePicUrl}')`;
                    document.getElementById('match-their-pic').style.backgroundImage = `url('${target.profilePicUrl}')`;
                    setTimeout(() => {
                        document.getElementById('match-overlay').classList.remove('hidden'); document.getElementById('match-overlay').classList.add('flex');
                    }, 300);
                }
            }
            setTimeout(() => { window.currentFeedIndex++; window.renderCurrentProfile(); }, 300);
        };

        window.closeMatchOverlay = () => { document.getElementById('match-overlay').classList.add('hidden'); document.getElementById('match-overlay').classList.remove('flex'); };

        window.openChatList = async () => {
            switchScreen('chat-list-screen');
            const container = document.getElementById('chat-list-container');
            container.innerHTML = `<div class="p-10 text-center text-gray-400 text-sm">Loading chats...</div>`;
            try {
                const myUid = window.currentUserData.uid;
                const matchesRef = collection(window.db, "Matches");
                const q = query(matchesRef, where("users", "array-contains", myUid));
                const snap = await getDocs(q);
                
                if(snap.empty) { container.innerHTML = `<div class="p-10 text-center text-gray-400 text-sm">No matches yet. Keep swiping! ⚡</div>`; return; }
                container.innerHTML = ""; 
                snap.forEach(async (matchDoc) => {
                    const uids = matchDoc.data().users; const targetUid = uids.find(id => id !== myUid);
                    if(window.blockedUidList.includes(targetUid)) return;
                    
                    const targetSnap = await getDoc(doc(window.db, "Users", targetUid));
                    if(targetSnap.exists()) {
                        const targetData = targetSnap.data();
                        const item = document.createElement('div');
                        item.className = "flex items-center gap-4 p-4 hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer transition border-b border-gray-100 dark:border-gray-800";
                        item.onclick = () => window.launchDirectChat(targetData);
                        item.innerHTML = `<div class="w-14 h-14 rounded-full bg-gray-200 bg-cover bg-center shadow-sm relative" style="background-image: url('${targetData.profilePicUrl}')">
                                ${targetData.online ? '<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white dark:border-gray-900"></div>' : ''}</div>
                            <div class="flex-1"><h3 class="font-bold text-gray-800 dark:text-white text-lg">${targetData.name}</h3><p class="text-sm text-gray-400 dark:text-gray-500 truncate">Tap to open chat</p></div>`;
                        container.appendChild(item);
                    }
                });
            } catch(e) { 
                console.error("Match error: ", e);
                container.innerHTML = `<div class="p-10 text-center text-red-400 text-sm">Oops! Error loading matches.</div>`; 
            }
        };

        window.launchDirectChat = (targetProfile) => { window.matchedProfileData = targetProfile; window.goToChatFromMatch(); };

        window.goToChatFromMatch = () => {
            window.closeMatchOverlay();
            if(window.matchedProfileData) {
                const targetUid = window.matchedProfileData.uid;
                document.getElementById('chat-header-name').innerText = window.matchedProfileData.name;
                document.getElementById('chat-header-pic').style.backgroundImage = `url('${window.matchedProfileData.profilePicUrl}')`;
                
                const u1 = window.currentUserData.uid; 
                window.activeChatId = u1 < targetUid ? `${u1}_${targetUid}` : `${targetUid}_${u1}`;
                
                window.unsubscribeStatusListener = onSnapshot(doc(window.db, "Users", targetUid), (docSnap) => {
                    if(docSnap.exists()){
                        const isOnline = docSnap.data().online;
                        document.getElementById('chat-header-status').innerText = isOnline ? 'Online' : 'Offline';
                        document.getElementById('chat-header-status').className = isOnline ? 'text-xs text-green-300 font-bold' : 'text-xs text-gray-300 font-medium h-4';
                    }
                });

window.unsubscribeTypingListener = onSnapshot(doc(window.db, "Chats", window.activeChatId), (docSnap) => {
                    if(docSnap.exists()) {
                        const isTyping = docSnap.data()[`typing_${targetUid}`];
                        if(isTyping) {
                            document.getElementById('chat-header-status').innerText = "... is typing";
                            document.getElementById('chat-header-status').className = "text-xs text-pink-300 font-bold italic animate-pulse h-4";
                        } else {
                            const wasOnline = document.getElementById('chat-header-status').className.includes('green');
                            document.getElementById('chat-header-status').innerText = wasOnline ? 'Online' : 'Offline';
                            document.getElementById('chat-header-status').className = wasOnline ? 'text-xs text-green-300 font-bold' : 'text-xs text-gray-300 font-medium h-4';
                        }
                    }
                });

                window.listenToMessages();
            }
            switchScreen('chat-screen');
        };

        window.listenToMessages = () => {
            const q = query(collection(window.db, "Chats", window.activeChatId, "Messages"), orderBy("timestamp", "asc"));
            window.unsubscribeChatListener = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-messages-container');
                container.innerHTML = `<div class="text-center text-gray-600 bg-yellow-100/90 mx-auto px-4 py-2 rounded-lg text-xs mt-3 shadow-sm font-medium">🔒 Messages are end-to-end encrypted</div>`; 

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const isMe = data.senderId === window.currentUserData.uid;
                    let timeString = "";
                    if(data.timestamp) { timeString = data.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }

                    if(!isMe && data.status !== 'read') { updateDoc(docSnap.ref, { status: 'read' }); }

                    let ticks = '<span class="text-gray-400 text-[10px]">✓</span>';
                    if (data.status === 'read') { ticks = '<span class="text-blue-500 text-xs font-bold shadow-sm">✓✓</span>'; } 
                    else if (data.status === 'sent') { ticks = '<span class="text-gray-500 text-xs font-bold">✓✓</span>'; }

                    const msgBubble = document.createElement('div');
                    if (isMe) {
                        msgBubble.className = "bg-[#dcf8c6] p-2 px-3 rounded-xl rounded-tr-none self-end max-w-[85%] shadow-sm text-sm";
                        msgBubble.innerHTML = `<span class="text-gray-800 leading-relaxed">${data.text}</span><span class="text-[10px] text-gray-500 ml-3 float-right mt-3 font-semibold">${timeString} <span class="ml-1">${ticks}</span></span>`;
                    } else {
                        msgBubble.className = "bg-white p-2 px-3 rounded-xl rounded-tl-none self-start max-w-[85%] shadow-sm text-sm";
                        msgBubble.innerHTML = `<span class="text-gray-800 leading-relaxed">${data.text}</span><span class="text-[10px] text-gray-400 ml-3 float-right mt-3 font-semibold">${timeString}</span>`;
                    }
                    container.appendChild(msgBubble);
                });
                setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
            });
        };

        window.handleTyping = async () => {
            if(!window.activeChatId) return;
            await setDoc(doc(window.db, "Chats", window.activeChatId), { [`typing_${window.currentUserData.uid}`]: true }, { merge: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(async () => {
                await setDoc(doc(window.db, "Chats", window.activeChatId), { [`typing_${window.currentUserData.uid}`]: false }, { merge: true });
            }, 1500);
        };

        window.sendLiveMessage = async () => {
            const input = document.getElementById('msg-input'); const text = input.value.trim();
            if(!text || !window.activeChatId) return;
            try {
                await addDoc(collection(window.db, "Chats", window.activeChatId, "Messages"), { senderId: window.currentUserData.uid, text: text, timestamp: serverTimestamp(), status: 'sent' });
                input.value = ""; 
                await setDoc(doc(window.db, "Chats", window.activeChatId), { [`typing_${window.currentUserData.uid}`]: false }, { merge: true });
            } catch (err) { window.showToast("Failed to send", "error"); }
        };

        window.blockUser = async () => {
            if(confirm("Block this user permanently?")) {
                try {
                    const myUid = window.currentUserData.uid; const targetUid = window.matchedProfileData.uid;
                    await setDoc(doc(window.db, "Blocks", `${myUid}_${targetUid}`), { blocker: myUid, blocked: targetUid, timestamp: Date.now() });
                    window.blockedUidList.push(targetUid); window.showToast("User blocked!", "error");
                    window.exitChat(); window.fetchDiscoverFeed(); 
                } catch (e) { window.showToast("Block failed", "error"); }
            }
        };

        window.exitChat = () => { 
            if(window.unsubscribeChatListener) window.unsubscribeChatListener(); 
            if(window.unsubscribeStatusListener) window.unsubscribeStatusListener();
            if(window.unsubscribeTypingListener) window.unsubscribeTypingListener();
            window.openChatList(); 
        };
    </script>
</body>
</html>
